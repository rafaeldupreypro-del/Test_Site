<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Votre Panier | Atelier Nora</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased">

    <nav class="fixed top-0 w-full bg-zinc-950/60 backdrop-blur-lg z-50 border-b border-zinc-900/60">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-base tracking-[0.3em] font-light uppercase text-accent">Atelier Nora</a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto pt-32 px-6">
        <h1 class="text-2xl font-light uppercase tracking-widest mb-10 text-white">Votre Panier</h1>
        
        <div id="cart-items" class="space-y-6 border-b border-zinc-800 pb-6">
            </div>

        <div class="mt-10 border-t border-zinc-800 pt-6 space-y-6">
            <div class="flex justify-between items-center text-white">
                <span class="text-sm">Total</span>
                <span id="cart-total" class="text-lg font-bold text-accent">0 €</span>
            </div>

            <button onclick="processPayment()" 
                    class="btn-gold w-full py-4 rounded-xl font-bold uppercase tracking-widest transition-all duration-300 hover:brightness-110">
                Procéder au paiement
            </button>
            
            <p class="stripe-security-text">
                Paiement sécurisé via Stripe
            </p>
        </div>
        
        <a href="index.html" class="btn-outline block text-center w-full py-4 rounded-xl font-bold uppercase tracking-widest mt-6">
            Continuer mes achats
        </a>
    </main>
</body>

    <script>
        function renderCart() {
        console.log("Le panier est en train de se générer...");
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cart-items');
        const totalElement = document.getElementById('cart-total');
        container.innerHTML = '';
        let total = 0;

        cart.forEach((item, index) => {
        container.innerHTML += `
            <div class="flex items-center gap-6 py-6 border-b border-zinc-800">
                <!-- Image agrandie -->
                <div class="w-20 h-20 bg-zinc-900 rounded-xl flex-shrink-0 border border-zinc-800"></div>
                
                <div class="flex-grow">
                    <!-- Nom du produit plus grand -->
                    <h3 class="text-lg font-medium text-white mb-1">${item.name}</h3>
                    
                    <!-- Quantité plus visible -->
                    <p class="text-sm text-zinc-400 uppercase tracking-wider mb-3">Quantité : ${item.quantity}</p>
                    
                    <!-- Bouton supprimer plus large et lisible -->
                    <button onclick="removeItem(${index})" class="text-xs text-red-500 hover:text-red-400 uppercase tracking-widest font-bold bg-zinc-900 px-3 py-1.5 rounded-md">
                        Retirer
                    </button>
                </div>
                
                <!-- Prix plus grand -->
                <span class="text-lg font-bold text-white">${item.price * item.quantity} €</span>
            </div>`;
        total += (item.price * item.quantity);
    });
        
        totalElement.innerText = total + " €";
    }
    // ... reste de la fonction removeItem ...

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (cart[index].quantity > 1) {
                cart[index].quantity -= 1;
            } else {
                cart.splice(index, 1);
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function renderCart() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cart-items');
        const totalElement = document.getElementById('cart-total');
        
        // On vide d'abord le conteneur
        container.innerHTML = '';
        let total = 0;

        // Si le panier est vide
        if (cart.length === 0) {
            container.innerHTML = '<p class="text-white text-xl">Votre panier est vide.</p>';
            totalElement.innerText = "0 €";
            return;
        }

        // Boucle d'affichage
        cart.forEach((item, index) => {
            total += (item.price * item.quantity);
            
            container.innerHTML += `
                <div class="flex items-center justify-between py-10 border-b border-zinc-700">
                    <div class="flex items-center gap-8">
                        <div class="w-28 h-28 bg-zinc-800 rounded-3xl flex-shrink-0"></div>
                        <div class="flex flex-col gap-3">
                            <h3 class="text-3xl font-extrabold text-white">${item.name}</h3>
                            <p class="text-xl text-zinc-300">Quantité : ${item.quantity}</p>
                            <button onclick="removeItem(${index})" class="text-lg text-red-400 font-bold uppercase tracking-widest mt-2">
                                Retirer
                            </button>
                        </div>
                    </div>
                    <span class="text-3xl font-bold text-white">${item.price * item.quantity} €</span>
                </div>`;
        });

        totalElement.innerText = total + " €";
    }
    async function processPayment() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        if (cart.length === 0) {
            alert("Le panier est vide.");
            return;
        }

        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const itemNames = cart.map(item => `- ${item.name} (x${item.quantity})`).join('\n');

        const testMessage = `--- MODE TEST ---\n\nProduits :\n${itemNames}\n\nTotal : ${total} €\n\nLe lien de paiement Stripe serait généré ici.`;

        alert(testMessage);
    }

    renderCart();
    </script>
</body>
</html>
