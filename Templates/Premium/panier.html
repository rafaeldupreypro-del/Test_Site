<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Votre Panier | Atelier Nora</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Force une taille de police plus grande sur mobile */
        #cart-items div h3 {
            font-size: 1.25rem !important; /* 20px */
            line-height: 1.75rem !important;
        }
        #cart-items div span {
            font-size: 1.25rem !important; /* 20px */
        }
        #cart-items div p {
            font-size: 1rem !important; /* 16px */
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased">

    <!-- Navigation simplifiée -->
    <nav class="fixed top-0 w-full bg-zinc-950/60 backdrop-blur-lg z-50 border-b border-zinc-900/60">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-base tracking-[0.3em] font-light uppercase text-white">Atelier Nora</a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto pt-32 px-6">
        <h1 class="text-2xl font-light uppercase tracking-widest mb-10">Votre Panier</h1>
        
        <div id="cart-items" class="space-y-6 border-b border-zinc-800 pb-6">
            <!-- Les produits s'injectent ici -->
        </div>

        <!-- Récapitulatif et bouton de paiement -->
            <div class="mt-10 border-t border-zinc-800 pt-6 space-y-6">
                <div class="flex justify-between items-center text-white">
                    <span class="text-sm">Total</span>
                    <span id="cart-total" class="text-lg font-bold">0 €</span>
                </div>

                <!-- Bouton de paiement -->
                <button onclick="processPayment()" 
                        class="w-full bg-white text-zinc-950 py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-zinc-200 transition-all duration-300">
                    Procéder au paiement
                </button>
                
                <p class="text-[10px] text-zinc-500 text-center uppercase tracking-widest">
                    Paiement sécurisé via Stripe
                </p>
            </div>
        <a href="index.html" class="block text-center mt-6 text-xs text-zinc-500 hover:text-white">Continuer mes achats</a>
    </main>

    <script>
        function renderCart() {
        console.log("Le panier est en train de se générer...");
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cart-items');
        const totalElement = document.getElementById('cart-total');
        container.innerHTML = '';
        let total = 0;

        cart.forEach((item, index) => {
        container.innerHTML += `
            <div class="flex items-center justify-between py-10 border-b border-zinc-700">
                <div class="flex items-center gap-8">
                    <!-- Image encore plus grande -->
                    <div class="w-28 h-28 bg-zinc-800 rounded-3xl flex-shrink-0"></div>
                    
                    <!-- Texte très grand -->
                    <div class="flex flex-col gap-3">
                        <h3 class="text-3xl font-extrabold text-white">${item.name}</h3>
                        <p class="text-xl text-zinc-300">Quantité : ${item.quantity}</p>
                        <button onclick="removeItem(${index})" class="text-lg text-red-400 font-bold uppercase tracking-widest mt-2">
                            Retirer
                        </button>
                    </div>
                </div>
                
                <!-- Prix très grand -->
                <span class="text-3xl font-bold text-white">${item.price * item.quantity} €</span>
            </div>`;
        total += (item.price * item.quantity);
    });
        
        totalElement.innerText = total + " €";
    }
    // ... reste de la fonction removeItem ...

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (cart[index].quantity > 1) {
                cart[index].quantity -= 1;
            } else {
                cart.splice(index, 1);
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function renderCart() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cart-items');
        const totalElement = document.getElementById('cart-total');
        
        container.innerHTML = '';
        let total = 0;

        // C'est ici que le forEach commence
        cart.forEach((item, index) => {
            // C'est ici que l'affichage est généré pour chaque produit
            container.innerHTML += `
                <div class="flex items-center justify-between py-8 border-b border-zinc-800">
                    <div class="flex items-center gap-6">
                        <!-- Image grande taille -->
                        <div class="w-24 h-24 bg-zinc-900 rounded-2xl flex-shrink-0"></div>
                        
                        <!-- Texte forcé en très gros -->
                        <div class="flex flex-col gap-2">
                            <h3 class="text-2xl font-bold text-white tracking-wide">${item.name}</h3>
                            <p class="text-base text-zinc-400 uppercase">Quantité: ${item.quantity}</p>
                            <button onclick="removeItem(${index})" class="text-sm text-red-500 font-bold uppercase tracking-widest mt-2 underline">
                                Retirer
                            </button>
                        </div>
                    </div>
                    
                    <!-- Prix forcé en très gros -->
                    <span class="text-2xl font-bold text-white">${item.price * item.quantity} €</span>
                </div>`;
            
            total += (item.price * item.quantity);
        });

        totalElement.innerText = total + " €";
    }
    </script>
</body>
</html>
