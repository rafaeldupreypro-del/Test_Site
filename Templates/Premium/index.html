<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Nora | Haute Joaillerie Artisanale</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-zinc-950/80 backdrop-blur-md z-50">
        <div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
            <!-- Logo -->
            <a href="index.html" class="text-sm tracking-[0.2em] uppercase font-light">Atelier Nora</a>
            
            <!-- Navigation Desktop -->
            <div class="hidden md:flex items-center space-x-8 text-[10px] tracking-widest uppercase font-light text-zinc-400">
                <a href="collections.html" class="hover:text-white transition-colors">Collections</a>
                <a href="index.html#boutique" class="hover:text-white transition-colors">E-Boutique</a>
                <a href="atelier.html" class="hover:text-white transition-colors">L'Atelier</a>
            </div>

            <!-- Icônes (Panier + Menu) -->
            <div class="flex items-center gap-6">
                <!-- Lien Panier -->
                <a href="panier.html" class="relative p-2 flex items-center">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    <span id="cart-count" class="absolute top-0 right-0 w-4 h-4 bg-amber-500 rounded-full text-[9px] font-bold text-zinc-950 flex items-center justify-center hidden">0</span>
                </a>
                
                <!-- Bouton Menu (Visible uniquement sur mobile) -->
                <button id="menu-btn" class="md:hidden p-2 flex items-center">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Menu Mobile (À placer juste après le <nav> pour éviter les problèmes de superposition) -->
    <div id="mobile-menu" class="hidden md:hidden fixed top-20 left-0 w-full bg-zinc-900 border-b border-zinc-800 p-6 space-y-6 text-center z-40">
        <a href="collections.html" class="block text-xs uppercase tracking-widest text-zinc-300">Collections</a>
        <a href="index.html#boutique" class="block text-xs uppercase tracking-widest text-zinc-300">E-Boutique</a>
        <a href="atelier.html" class="block text-xs uppercase tracking-widest text-zinc-300">L'Atelier</a>
    </div>

    <!-- Hero -->
    <section class="min-h-screen flex items-center justify-center px-4 text-center">
        <div class="max-w-2xl space-y-6">
            <h1 class="text-4xl md:text-5xl font-extralight tracking-tight uppercase leading-snug">Façonné à la main.<br>Porté pour l'éternité.</h1>
            <p class="text-zinc-400 text-sm font-light">Pièces uniques en or recyclé 18 carats.</p>
            <a href="#boutique" class="inline-block border border-zinc-800 text-[10px] uppercase tracking-widest px-8 py-3 rounded-full hover:bg-zinc-900 transition-all">Explorer</a>
        </div>
    </section>

    <!-- Boutique -->
    <section id="boutique" class="py-20 px-4">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-center text-lg tracking-widest uppercase mb-16">La Collection Permanente</h2>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Injection JS -->
            </div>
        </div>
    </section>

    <!-- Modale -->
    <div id="product-modal" class="fixed inset-0 z-[100] hidden bg-zinc-950/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl w-full max-w-sm relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-zinc-400"><i data-lucide="x"></i></button>
            <div class="aspect-square bg-zinc-950 border border-zinc-800 rounded-xl mb-4 flex items-center justify-center">Image</div>
            <h2 id="modal-name" class="text-lg font-medium mb-1"></h2>
            <p id="modal-desc" class="text-xs text-zinc-400 mb-6 font-light"></p>
            <button id="modal-btn" class="w-full bg-amber-600 text-zinc-950 py-3 rounded-lg text-xs uppercase tracking-widest font-bold">
                <span>Ajouter au panier</span>
            </button>
        </div>
    </div>

    <script>
    const products = [
        { name: "Alliance Dune", price: 420, desc: "Or 18k, martelé main.", meta: "Classique" },
        { name: "Pendentif Astral", price: 680, desc: "Saphir bleu de Ceylan.", meta: "Saphir" },
        { name: "Créoles Écorce", price: 510, desc: "Or jaune & diamants.", meta: "Diamants" },
        { name: "Bague Épure", price: 950, desc: "Diamant solitaire.", meta: "Solitaire" },
        { name: "Joncs Entrelacés", price: 1200, desc: "Trois ors entrelacés.", meta: "Or 18k" },
        { name: "Boucles Nébuleuses", price: 720, desc: "Design organique.", meta: "Martelé" }
    ];

    const grid = document.getElementById('product-grid');

    // 1. Génération de la grille
   products.forEach(p => {
    const card = document.createElement('div');
    // Carte avec un fond légèrement plus clair pour se détacher du fond du site
    card.className = "group bg-zinc-900/40 border border-zinc-800 p-4 rounded-2xl transition-all hover:border-zinc-700";
    
    card.innerHTML = `
        <div class="aspect-square bg-zinc-900 border border-zinc-800 rounded-xl mb-4 cursor-pointer overflow-hidden">
            </div>
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-sm font-medium text-white">${p.name}</h3>
            <span class="text-sm font-semibold text-accent">
                ${p.price} €
            </span>
        </div>
        <button data-id="${p.name}" 
                class="btn-gold w-full py-3 rounded-lg font-bold uppercase tracking-widest transition-all duration-300">
            <span>Ajouter au panier</span>
        </button>
    `;
    
    // Événements
    card.querySelector('.aspect-square').onclick = () => openModal(p);
    
    // Utilisation de currentTarget pour assurer que le bouton est bien le déclencheur
    card.querySelector('button').onclick = (e) => addToCart({ 
        id: p.name, 
        name: p.name, 
        price: p.price 
    }, e.currentTarget);
    
    grid.appendChild(card);
});

    // 2. Fonction d'animation temporaire
    function triggerSuccess(btn) {
        const originalText = btn.innerText;
        btn.innerText = "Ajouté !";
        btn.classList.replace('bg-white', 'bg-green-600');
        btn.classList.replace('text-zinc-950', 'text-white');

        setTimeout(() => {
            btn.innerText = originalText;
            btn.classList.replace('bg-green-600', 'bg-white');
            btn.classList.replace('text-white', 'text-zinc-950');
        }, 1000);
    }

    // 3. Ajout au panier
    function addToCart(product, btn) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const index = cart.findIndex(item => item.id === product.id);

    if (index > -1) {
        cart[index].quantity += 1;
    } else {
        product.quantity = 1;
        cart.push(product);
    }

    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    
    // Si le bouton est passé en paramètre, on lance l'animation
    if(btn) {
        triggerSuccess(btn);
    }
}

function triggerSuccess(buttonElement) {
    const originalText = buttonElement.querySelector('span').innerText;

    // On retire la classe Or, on ajoute la classe Verte
    buttonElement.classList.remove('btn-gold');
    buttonElement.classList.add('btn-success');
    buttonElement.querySelector('span').innerText = "Ajouté !";

    // Revenir à l'or après 2 secondes
    setTimeout(() => {
        buttonElement.classList.remove('btn-success');
        buttonElement.classList.add('btn-gold');
        buttonElement.querySelector('span').innerText = originalText;
    }, 1000);
}

    // 4. Utilitaires conservés intacts
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        const el = document.getElementById('cart-count');
        if(el) {
            el.innerText = count;
            el.classList.toggle('hidden', count === 0);
        }
    }

    function openModal(p) {
        document.getElementById('modal-name').innerText = p.name;
        document.getElementById('modal-desc').innerText = p.desc;
        const btn = document.getElementById('modal-btn');
        btn.onclick = () => addToCart({ id: p.name, name: p.name, price: p.price }, btn);
        document.getElementById('product-modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }

    // Menu Mobile
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    menuBtn.onclick = () => {
        mobileMenu.classList.toggle('hidden');
        const icon = menuBtn.querySelector('i');
        icon.setAttribute('data-lucide', mobileMenu.classList.contains('hidden') ? 'menu' : 'x');
        lucide.createIcons();
    };

    // Initialisation
    document.addEventListener('DOMContentLoaded', () => {
        updateCartCount();
        lucide.createIcons();
    });
</script>
</body>
</html>
