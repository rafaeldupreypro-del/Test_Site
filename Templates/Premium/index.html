<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Nora | Haute Joaillerie Artisanale</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased">

    <nav class="fixed top-0 w-full bg-zinc-950/60 backdrop-blur-lg z-50 border-b border-zinc-900/60">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="#" class="text-base tracking-[0.3em] font-light uppercase text-white">Atelier Nora</a>
            <div class="hidden md:flex items-center space-x-10 text-xs tracking-widest uppercase font-light text-zinc-400">
                <a href="collections.html" class="hover:text-white transition-colors">Collections</a>
                <a href="index.html#boutique" class="hover:text-white transition-colors">E-Boutique</a>
                <a href="atelier.html" class="hover:text-white transition-colors">L'Atelier</a>
            </div>
            <a href="panier.html" class="relative text-zinc-300 hover:text-white p-2 cursor-pointer transition-colors">
                <i data-lucide="shopping-bag" class="w-4 h-4"></i>
                <span id="cart-count" class="absolute top-0 right-0 w-3 h-3 bg-amber-500 rounded-full text-[8px] font-bold text-zinc-950 flex items-center justify-center" style="display: none;">0</span>
            </a>
        </div>
    </nav>

    <section class="min-h-screen flex items-center justify-center px-6 text-center">
        <div class="max-w-3xl space-y-8">
            <h1 class="text-3xl sm:text-5xl font-extralight tracking-[0.15em] uppercase text-white leading-relaxed">Façonné à la main.<br>Porté pour l'éternité.</h1>
            <p class="text-zinc-400 max-w-lg mx-auto text-sm tracking-wide font-light leading-relaxed">Pièces uniques en or recyclé 18 carats et pierres précieuses sourcées éthiquement.</p>
            <a href="#boutique" class="inline-block border border-zinc-800 tracking-widest text-[10px] uppercase font-medium text-zinc-300 px-8 py-4 rounded-full hover:bg-zinc-900 hover:text-white transition-all">Explorer la boutique</a>
        </div>
    </section>

    <section id="boutique" class="py-28 border-t border-zinc-900 bg-zinc-900/10 px-6">
        <div class="max-w-6xl mx-auto space-y-16">
            <div class="text-center space-y-2">
                <span class="text-amber-500/80 font-medium tracking-widest text-[9px] uppercase">Achat Sécurisé Stripe</span>
                <h2 class="text-xl sm:text-2xl font-light tracking-widest uppercase text-white">La Collection Permanente</h2>
            </div>

            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-10">
                </div>
        </div>
    </section>

    <div id="product-modal" class="fixed inset-0 z-[100] hidden bg-zinc-950/80 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl max-w-md w-full relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-zinc-500 hover:text-white cursor-pointer z-10"><i data-lucide="x"></i></button>
            <div class="aspect-square bg-zinc-950 border border-zinc-800 rounded-2xl mb-6 flex items-center justify-center text-zinc-700">[ Image Produit ]</div>
            <h2 id="modal-name" class="text-xl font-medium mb-2"></h2>
            <p id="modal-desc" class="text-sm text-zinc-400 mb-6 font-light"></p>
            <button id="modal-btn" class="w-full bg-amber-600 text-zinc-950 py-3 rounded-xl text-xs uppercase tracking-widest font-bold"><span>Ajouter au panier</span></button>
        </div>
    </div>

    <script>
        const products = [
            { name: "Alliance Dune Or 18k", price: 420, desc: "Une création artisanale en or 18k, martelée à la main.", meta: "Martelée à la main" },
            { name: "Pendentif Astral", price: 680, desc: "Saphir bleu de Ceylan monté sur or 18k.", meta: "Saphir bleu de Ceylan" },
            { name: "Créoles Écorce", price: 510, desc: "Or jaune & éclats de diamant.", meta: "Or jaune & diamants" },
            { name: "Bague Solitaire Épure", price: 950, desc: "Design minimaliste, diamant solitaire éthique.", meta: "Diamant solitaire" },
            { name: "Joncs Entrelacés", price: 1200, desc: "Trois ors entrelacés, symbole d'union.", meta: "Or 18k" },
            { name: "Boucles Nébuleuses", price: 720, desc: "Design organique inspiré par le cosmos.", meta: "Or martelé" }
        ];

        // Rendu des produits
        const grid = document.getElementById('product-grid');
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = "group space-y-4";
            card.innerHTML = `
                <div class="aspect-square bg-zinc-900 border border-zinc-800 rounded-3xl cursor-pointer hover:border-amber-500 transition-colors flex items-center justify-center text-zinc-700">
                    [ Image ]
                </div>
                <div class="flex justify-between items-start text-xs tracking-wide">
                    <div class="space-y-1">
                        <h3 class="font-medium text-white">${p.name}</h3>
                        <p class="text-zinc-500 font-light text-[11px]">${p.meta}</p>
                    </div>
                    <span class="font-medium text-zinc-300">${p.price} €</span>
                </div>
                <button class="w-full bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-white text-[10px] uppercase tracking-widest font-medium py-3 rounded-xl transition-colors">
                    <span>Ajouter au panier</span>
                </button>
            `;
            
            // Attacher les événements proprement pour éviter les problèmes d'apostrophes
            card.querySelector('.aspect-square').onclick = () => openModal(p.name, p.price, p.desc);
            card.querySelector('button').onclick = function() { addToCart(p.name, p.price, this); };
            
            grid.appendChild(card);
        });

        function addToCart(name, price, btn) {
            // 1. Logique panier
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let item = cart.find(i => i.name === name);
            if (item) item.quantity += 1; else cart.push({ name, price, quantity: 1 });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();

            // 2. Animation (Commune au bouton de carte et au bouton de modale)
            const span = btn.querySelector('span') || btn;
            const originalText = span.innerText;
            const originalBg = btn.classList.contains('bg-amber-600') ? 'bg-amber-600' : 'bg-zinc-900';
            
            span.innerHTML = 'Ajouté';
            btn.classList.remove(originalBg, 'bg-zinc-900', 'bg-amber-600');
            btn.classList.add('bg-emerald-700');
            
            setTimeout(() => {
                btn.classList.remove('bg-emerald-700');
                btn.classList.add(originalBg);
                span.innerText = originalText;
            }, 1000);
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const el = document.getElementById('cart-count');
            el.innerText = count;
            el.style.display = count > 0 ? 'flex' : 'none';
        }

        function openModal(name, price, desc) {
            document.getElementById('modal-name').innerText = name;
            document.getElementById('modal-desc').innerText = desc;
            
            const btn = document.getElementById('modal-btn');
            // On s'assure que le bouton garde son texte initial
            btn.innerHTML = '<span>Ajouter au panier</span>';
            
            // On passe le bouton lui-même à la fonction
            btn.onclick = () => addToCart(name, price, btn);
            
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        lucide.createIcons();
        updateCartCount();
    </script>
</body>
</html>
