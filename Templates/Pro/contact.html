<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prendre RDV | BlackInk Studio Le Havre</title>
    <meta name="description" content="Planifiez votre projet de tatouage à Le Havre. Envoyez vos spécifications ou bloquez un créneau de consultation.">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-black text-zinc-100 antialiased">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-black/70 backdrop-blur-md z-50 border-b border-zinc-900">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between relative">
            
            <!-- Logo : positionné à gauche, ne gêne pas le centrage -->
            <a href="index.html" class="text-xl font-bold tracking-widest text-white uppercase z-10">
                Black<span class="text-indigo-500">Ink</span>
            </a>
            
            <!-- Conteneur des liens : positionné en absolu pour être parfaitement centré sur la page -->
            <div class="absolute left-0 right-0 hidden md:flex items-center justify-center space-x-8 text-xs font-semibold uppercase tracking-wider text-zinc-400 pointer-events-none">
                <div class="pointer-events-auto flex space-x-8">
                    <a href="index.html" class="hover:text-white transition-colors whitespace-nowrap">Accueil</a>
                    <a href="portfolio.html" class="hover:text-white transition-colors whitespace-nowrap">Portfolio</a>
                    <a href="services.html" class="hover:text-white transition-colors whitespace-nowrap">Tarifs & Process</a>
                    <a href="contact.html" class="text-white whitespace-nowrap">Prendre RDV</a>
                </div>
            </div>

            <!-- Espace vide ou élément optionnel à droite pour équilibrer -->
            <div class="z-10"></div>
        </div>
    </nav>

    <!-- Contenu Contact -->
    <main class="pt-32 pb-24 max-w-6xl mx-auto px-6 space-y-16">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
            
        <!-- Colonne Gauche : Formulaire Intelligent -->
        <div class="space-y-6">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Décrivez votre idée</h1>
                <p class="text-zinc-400 text-xs font-light mt-2">Soumettez vos critères pour recevoir une estimation par e-mail.</p>
            </div>

            <!-- Rétablissement de la balise form avec id pour le JavaScript -->
            <form id="contactForm" class="space-y-4 bg-zinc-900/40 border border-zinc-800 p-6 rounded-2xl">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Nom / Prénom</label>
                    <input type="text" id="name" required class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm focus:border-indigo-500 focus:outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Style recherché</label>
                        <select id="style" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm text-zinc-300 focus:border-indigo-500 focus:outline-none">
                            <option>Réalisme Noir & Blanc</option>
                            <option>FineLine / Trait fin</option>
                            <option>Blackwork / Géométrique</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Emplacement corps</label>
                        <input type="text" id="emplacement" placeholder="Ex: Avant-bras" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm focus:border-indigo-500 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Description détaillée du projet</label>
                    <textarea id="description" rows="4" required placeholder="Dimensions, symbolique, détails visuels importants..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-sm focus:border-indigo-500 focus:outline-none"></textarea>
                </div>

                <button type="button" onclick="sendEmail()" class="w-full bg-indigo-600 text-white py-3.5 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-indigo-500 transition-colors cursor-pointer">
                    Soumettre ma demande
                </button>
            </form>
        </div>

            <!-- Colonne Droite : Module Calendly Synchrone -->
            <div class="space-y-6">
                <div>
                    <h2 class="text-3xl font-bold text-white tracking-tight">Session Directe</h2>
                    <p class="text-zinc-400 text-xs font-light mt-2">Bloquez instantanément un échange de 15 minutes sans attente.</p>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-2 shadow-2xl">
                    <!-- Remplacer par votre lien d'événement Calendly actif -->
                    <div class="calendly-inline-widget" data-url="https://calendly.com/rafaeldupreypro/15min" style="min-width:320px;height:500px;width:100%;"></div>
                    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-zinc-900 bg-zinc-950 text-center text-xs text-zinc-600">
        <p>BlackInk Studio — 88 Rue Victor Hugo, 76600 Le Havre</p>
    </footer>

   <script>
    function sendEmail() {
        const name = document.getElementById('name').value;
        const style = document.getElementById('style').value;
        const emplacement = document.getElementById('emplacement').value;
        const description = document.getElementById('description').value;

        // Vérification basique pour voir si les champs obligatoires sont remplis
        if (!name || !description) {
            alert("Veuillez remplir votre nom et la description du projet.");
            return;
        }

        const subject = encodeURIComponent("Nouvelle demande de tatouage : " + name);
        const body = encodeURIComponent(`Nom : ${name}\nStyle : ${style}\nEmplacement : ${emplacement}\n\nDescription :\n${description}`);

        window.location.href = `mailto:rafaeldupreycrypto@gmail.com?subject=${subject}&body=${body}`;
    }
    </script>
</body>
</html>
